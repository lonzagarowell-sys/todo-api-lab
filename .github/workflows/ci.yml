name: Node.js CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Jest Unit Tests
      run: npm test

    - name: Start Server in Background for Postman Tests
      run: npm start &
      
    - name: Wait for server to boot up
      run: sleep 3

    - name: Run Postman Tests via Newman
      run: npm run test:postman